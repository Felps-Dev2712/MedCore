services:
  backend:
    build: ./backend
    container_name: medcore-backend
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-super-secret-change-me}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=*
      - CORS_ALLOWED_ORIGINS=*
    volumes:
      - db-data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: medcore-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db-data:
